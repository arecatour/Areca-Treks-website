backend:
  name: github
  repo: arecatour/Areca-Treks-website
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - label: "Homepage"
        name: "index"
        file: "index.html"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
